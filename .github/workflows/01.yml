name: Extract GDrive Links

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Public Google Drive folder URL'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract & save links
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          FOLDER_ID=$(echo "$URL" | grep -oP 'folders/\K[a-zA-Z0-9_-]+')

          python3 << 'EOF'
          import requests, re, json

          FOLDER_ID = "${{ env.FOLDER_ID }}"
          URL = f"https://drive.google.com/drive/folders/{FOLDER_ID}"
          headers = {"User-Agent": "Mozilla/5.0"}
          html = requests.get(URL, headers=headers).text

          # Extract items from Google's embedded JSON
          items = []
          for match in re.finditer(r'\["([^"]+)"\s*,\s*"([^"]+)"\s*,\s*"([^"]+)"\s*,\s*"([^"]+)"\]', html):
              file_id, name, mime, _ = match.groups()
              if mime.startswith('application/vnd.google-apps.folder'):
                  continue  # skip folders
              if name and file_id and len(file_id) == 33:
                  link = f"https://drive.google.com/uc?id={file_id}&export=download"
                  items.append(f"{name} --- {link}")

          with open("list.txt", "w") as f:
              f.write("\n".join(sorted(set(items))))
          print(f"✅ Saved {len(items)} links to list.txt")
          EOF
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}

      - name: Upload list.txt
        uses: actions/upload-artifact@v4
        with:
          name: download-links
          path: list.txt
