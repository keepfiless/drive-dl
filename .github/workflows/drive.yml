name: Google Drive File Lister

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: 'Google Drive folder URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gdown

      - name: List files from Google Drive
        env:
          GDRIVE_URL: ${{ github.event.inputs.gdrive_url }}
        run: python scripts/gdrive_list.py

      - name: Commit list.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add list.txt
          git commit -m "Update list.txt" || echo "No changes"
          git push

      - name: Upload list.txt
        uses: actions/upload-artifact@v4
        with:
          name: file-list
          path: list.txt
